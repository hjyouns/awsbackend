name: Deploy to Amazon EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 수동 실행 버튼 추가

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: aws-lab-app

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4 # v3 -> v4 업데이트

    # JDK 설정 (Spring Boot 빌드용)
    - name: Set up JDK 17
      uses: actions/setup-java@v4 # v3 -> v4 업데이트
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Gradle 호환성 문제 해결 (버전 고정)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.7 # 이전 에러(9.4.1 호환성) 해결을 위해 8.7로 고정

    # 빌드 권한 부여 및 빌드
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew bootJar

    # AWS 인증
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4 # v2 -> v4 업데이트
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # ECR 로그인
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2 # v1 -> v2 업데이트

    # Docker 이미지 빌드 및 ECR 푸시
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # EC2에 접속하여 배포
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3 # master -> 최신 버전으로 고정
      with:
        # 중요: GitHub Secrets에 등록한 이름이 EC2_HOST인지 EC2_FRONTEND_HOST인지 확인하세요.
        # 여기서는 로그에서 발생한 'missing server host' 에러를 잡기 위해 Secrets 이름을 확인해야 합니다.
        host: ${{ secrets.EC2_HOST }} 
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
        script: |
          # ECR 로그인 및 컨테이너 갱신
          aws ecr get-login-password --region ap-northeast-2 | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          
          # 기존 컨테이너 중지 및 삭제 (에러 발생해도 무시하도록 || true 유지)
          sudo docker stop aws-lab-app || true
          sudo docker rm aws-lab-app || true
          
          # 최신 이미지 pull 및 실행
          sudo docker pull ${{ steps.login-ecr.outputs.registry }}/aws-lab-app:latest
          sudo docker run -d --name aws-lab-app -p 8080:8080 -e DB_URL=${{ secrets.DB_URL }} -e DB_USERNAME=${{ secrets.DB_USERNAME }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} ${{ steps.login-ecr.outputs.registry }}/aws-lab-app:latest
          
          # 사용하지 않는 오래된 이미지 정리
          sudo docker image prune -f
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ap-northeast-2